name: Bulk Data - Flatten Audit JSON and Create PR

on:
  push:
    branches:
      - lh/bulk-data-download-feature
    paths:
      - 'assets/data-download/*.csv'

  workflow_dispatch:

jobs:
  flatten-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FAC-transition-site repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Run JSON flattener
        run: |
          for file in assets/data-download/*.csv; do
            base=$(basename "$file" .csv)
            python3 scripts/flatten_audit_json.py "$file" "assets/data-download/flattened_${base}.csv"
          done

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push Flattened CSVs
        run: |
          git checkout -b auto-flatten-json || git checkout auto-flatten-json
          git add assets/data-download/flattened_*.csv

          if git diff --cached --quiet; then
            echo "No new flattened files to commit."
            exit 0
          fi

          git commit -m "Auto-flatten audit JSON on new upload"
          git push https://x-access-token:${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}@github.com/GSA-TTS/FAC-transition-site.git auto-flatten-json

      - name: Create or Update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --repo GSA-TTS/FAC-transition-site --head auto-flatten-json --json number --jq '.[0].number')

          if [[ -z "$PR_EXISTS" ]]; then
            gh pr create \
              --repo GSA-TTS/FAC-transition-site \
              --head auto-flatten-json \
              --base main \
              --title "Flattened audit JSON added: $(date +'%Y-%m-%d')" \
              --body "Automatically generated by GitHub Actions when new data file(s) were added."
          else
            gh pr edit $PR_EXISTS \
              --repo GSA-TTS/FAC-transition-site \
              --title "Flattened audit JSON added: $(date +'%Y-%m-%d')" \
              --body "Updated with new flattened CSVs after data file upload."
          fi
